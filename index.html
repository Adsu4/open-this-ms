<!DOCTYPE html>
<html class="h-full" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Apology Game</title>

    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="styles.css">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#674bb5",
                        "primary-fixed": "#e8ddff",
                        "primary-fixed-dim": "#cebdff",
                        "primary-container": "#a78bfa",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#3c1989",
                        secondary: "#5f5a7c",
                        "secondary-fixed": "#e5deff",
                        "secondary-container": "#dcd5fd",
                        "on-secondary": "#ffffff",
                        "surface": "#faf9fb",
                        "on-surface": "#1a1c1d",
                        "surface-variant": "#e3e2e4",
                        "on-surface-variant": "#494552",
                        "surface-container-low": "#f4f3f5",
                        background: "#faf9fb",
                        "on-background": "#1a1c1d",
                        "error": "#ba1a1a",
                    },
                    fontFamily: {
                        "body-lg": ["Outfit", "sans-serif"],
                        "body-md": ["Outfit", "sans-serif"],
                        "title-md": ["Outfit", "sans-serif"],
                        "headline-lg": ["Playfair Display", "serif"],
                        "display-lg": ["Playfair Display", "serif"],
                    }
                }
            }
        }
    </script>
</head>

<body
    class="h-full bg-background overflow-hidden font-body-md text-on-background relative flex items-center justify-center">

    <!-- Audio is generated via Web Audio API in script.js -->

    <!-- Background Bubbles -->
    <div class="bg-bubble w-[600px] h-[600px] top-[-100px] left-[-100px]"></div>
    <div class="bg-bubble w-[500px] h-[500px] bottom-[-50px] right-[-100px]"
        style="animation-delay: -5s; background: radial-gradient(circle at 30% 30%, rgba(229, 222, 255, 0.5), rgba(167, 139, 250, 0.05));">
    </div>

    <!-- Screens Container -->
    <main class="w-full max-w-[800px] mx-auto px-6 py-10 relative z-10 grid place-items-center h-full">

        <!-- Start Screen -->
        <div id="startScreen"
            class="screen active clay-card p-8 md:p-12 w-full max-w-lg flex flex-col items-center text-center gap-6 relative overflow-hidden">
            <h1 class="font-headline-lg text-3xl md:text-4xl text-primary tracking-tight">Welcome!</h1>
            <p class="font-body-lg text-lg text-on-surface-variant">Turn up your volume and tap to start ☔️</p>
            <button id="startBtn"
                class="clay-btn bg-primary text-on-primary rounded-full px-8 py-4 font-title-md text-xl flex items-center gap-2 mt-4">
                <span class="material-symbols-outlined">play_arrow</span>
                Start
            </button>
        </div>

        <!-- Main Game Container -->
        <div id="gameContainer"
            class="screen clay-card p-8 md:p-12 w-full max-w-[600px] flex flex-col items-center text-center gap-8 relative overflow-hidden hidden-state">
            <div class="absolute -top-12 -right-12 w-32 h-32 bg-primary-fixed-dim/30 rounded-full blur-2xl z-0"></div>

            <div id="imageWrapper"
                class="w-48 h-48 md:w-64 md:h-64 rounded-full overflow-hidden clay-btn relative group mx-auto border-4 border-surface z-10 bg-white">
                <img id="mainImage" src="" alt="Cute Image"
                    class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 ease-out">
            </div>

            <div class="flex flex-col gap-4 z-10 w-full max-w-[500px]">
                <h1 id="questionText" class="font-headline-lg text-2xl md:text-3xl text-primary tracking-tight"></h1>
            </div>

            <div id="optionsContainer"
                class="flex flex-col sm:flex-row gap-4 w-full justify-center z-10 min-h-[80px] items-center">
                <!-- Buttons injected here -->
            </div>
        </div>

        <!-- Message Form Screen -->
        <div id="messageScreen"
            class="screen clay-card p-8 md:p-10 w-full max-w-lg flex flex-col items-center text-center gap-6 relative overflow-hidden hidden-state">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-primary-fixed-dim/40 rounded-full blur-2xl z-0"></div>
            <div
                class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center mb-2 clay-btn z-10">
                <span class="material-symbols-outlined text-on-primary-container text-4xl"
                    style="font-variation-settings: 'FILL' 1;">mail</span>
            </div>
            <h1 class="font-headline-lg text-3xl md:text-4xl text-primary tracking-tight z-10">That's my Girl!!!</h1>
            <p class="font-body-md text-on-surface-variant max-w-xs mx-auto z-10">Send a sweet message to seal the deal.
            </p>

            <form id="messageForm" class="w-full space-y-4 text-left mt-4 z-10">
                <div class="space-y-1">
                    <label class="font-body-md text-sm text-secondary px-2">Subject</label>
                    <input type="text" id="subject"
                        class="w-full bg-surface-container-low border-none rounded-full py-3 px-5 focus:ring-2 focus:ring-primary-fixed outline-none shadow-[inset_4px_4px_10px_rgba(103,75,181,0.05),inset_-4px_-4px_10px_rgba(255,255,255,0.8)]"
                        placeholder="A little note...">
                </div>
                <div class="space-y-1">
                    <label class="font-body-md text-sm text-secondary px-2">Message</label>
                    <textarea id="message" required
                        class="w-full bg-surface-container-low border-none rounded-2xl py-3 px-5 focus:ring-2 focus:ring-primary-fixed outline-none shadow-[inset_4px_4px_10px_rgba(103,75,181,0.05),inset_-4px_-4px_10px_rgba(255,255,255,0.8)] resize-none"
                        rows="4" placeholder="Write your heart out..."></textarea>
                </div>
                <button type="submit" id="sendBtn"
                    class="clay-btn bg-primary w-full py-4 mt-4 rounded-full text-on-primary font-title-md text-lg flex items-center justify-center gap-2">
                    <span>Send</span>
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
                </button>
                <p id="statusMessage" class="hidden text-error text-center mt-2"></p>
            </form>
        </div>

        <!-- Thank You Screen -->
        <div id="thankYouScreen"
            class="screen clay-card p-8 md:p-12 w-full max-w-lg flex flex-col items-center text-center gap-6 relative overflow-hidden hidden-state">
            <div
                class="relative w-32 h-32 bg-secondary-container rounded-full flex items-center justify-center mb-4 clay-btn">
                <div
                    class="absolute -top-4 -right-4 w-12 h-12 bg-primary-container rounded-full flex items-center justify-center animate-bounce shadow-lg">
                    <span class="material-symbols-outlined text-on-primary-container text-xl"
                        style="font-variation-settings: 'FILL' 1;">local_cafe</span>
                </div>
                <img src="https://media1.tenor.com/m/bE_r8R6J5-EAAAAd/tkthao219-bubududu.gif"
                    class="w-24 h-24 object-contain opacity-90 drop-shadow-lg rounded-full">
            </div>

            <h1 class="font-headline-lg text-4xl text-primary tracking-tight">Thank You Ji! ❤️</h1>
            <p class="font-body-lg text-xl text-on-surface-variant font-bold mt-2">Here's the Kappi for you ☕</p>
        </div>

    </main>
    <script src="script.js"></script>
</body>

</html>
